<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GooeyJS Element Reference</title>
    <script type="module" src="../src/GooeyJS.js"></script>
    <script src="data/inherited.js"></script>
    <script src="data/root-elements.js"></script>
    <script src="data/data.js"></script>
    <script src="data/graphics.js"></script>
    <script src="data/ui/button.js"></script>
    <script src="data/ui/data.js"></script>
    <script src="data/ui/form.js"></script>
    <script src="data/ui/menu.js"></script>
    <script src="data/ui/panel.js"></script>
    <script src="data/ui/toolbar.js"></script>
    <script src="data/ui/window.js"></script>
    <script src="data/ui/media.js"></script>
    <script src="data/ui/navigation.js"></script>
    <script src="data/ui/notification.js"></script>
    <script src="data/ui/common.js"></script>
    <script src="data/index.js"></script>
    <script type="module" src="app.js"></script>
</head>
<body>
    <gooey-theme name="docs-reference" href="theme/docs-reference.css" active>
        <gooey-theme-override target="gooeyui-tree" href="theme/overrides/tree.css"></gooey-theme-override>
        <gooey-theme-override target="gooeyui-treeitem" href="theme/overrides/tree.css"></gooey-theme-override>
        <gooey-theme-override target="gooeyui-splitpanel" href="theme/overrides/splitpanel.css"></gooey-theme-override>
        <gooey-theme-override target="gooeyui-panel" href="theme/overrides/panel.css"></gooey-theme-override>
        <gooey-theme-override target="gooeyui-statusbar" href="theme/overrides/statusbar.css"></gooey-theme-override>
        <gooey-theme-override target="gooeyui-label" href="theme/overrides/label.css"></gooey-theme-override>
    </gooey-theme>

    <gooey-component href="../src/gooey/ui/panel/SplitPanel"></gooey-component>
    <gooey-component href="../src/gooey/ui/panel/Panel"></gooey-component>
    <gooey-component href="../src/gooey/ui/navigation/Tree"></gooey-component>
    <gooey-component href="../src/gooey/ui/navigation/TreeItem"></gooey-component>
    <gooey-component href="../src/gooey/ui/data/DataGrid"></gooey-component>
    <gooey-component href="../src/gooey/ui/Label"></gooey-component>
    <gooey-component href="../src/gooey/ui/layout/StatusBar"></gooey-component>
    <gooey-component href="../src/gooey/ui/CodeBlock"></gooey-component>

    <gooey-application>
        <gooeyui-apppanel>
            <gooeyui-statusbar id="titleBar" position="top" height="28">
                <span slot="left">
                    <svg viewBox="0 0 16 16" fill="currentColor" style="width:16px;height:16px;vertical-align:middle;margin-right:8px">
                        <rect x="1" y="1" width="6" height="6" fill="#ff0"/>
                        <rect x="9" y="1" width="6" height="6" fill="#0f0"/>
                        <rect x="1" y="9" width="6" height="6" fill="#f00"/>
                        <rect x="9" y="9" width="6" height="6" fill="#00f"/>
                    </svg>
                    GooeyJS Element Reference
                </span>
            </gooeyui-statusbar>

            <gooeyui-splitpanel orientation="horizontal" id="mainSplit" dividerlocation="220px">
                <gooeyui-panel id="leftPanel" width="220">
                    <gooeyui-label text="Elements" id="panelHeader"></gooeyui-label>
                    <gooeyui-tree id="elementTree"></gooeyui-tree>
                </gooeyui-panel>

                <gooeyui-panel id="detailPanel">
                    <!-- Content populated dynamically by app.js -->
                </gooeyui-panel>
            </gooeyui-splitpanel>
        </gooeyui-apppanel>
    </gooey-application>
</body>
</html>
